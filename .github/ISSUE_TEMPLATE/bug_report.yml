name: Bug report
description: Report a reproducible defect without including any q3key value.
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not paste or attach generated q3key data, a generated value, private path or account information.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v1.0.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows 11 23H2, Windows PowerShell 5.1
    validations:
      required: true
  - type: dropdown
    id: action
    attributes:
      label: Affected action
      options:
        - Launch through KEYGEN.bat
        - Generate Arena
        - Generate Team Arena
        - Save As Arena
        - Save As Team Arena
        - Save Both As
        - Install Arena
        - Install Team Arena
        - Install Both
        - Installation detection or rescan
        - About dialog
        - SelfTest
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Redact personal paths and never include generated key values.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized error text
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Sensitive-data check
      options:
        - label: I removed q3key values, personal paths and private server/account data.
          required: true
